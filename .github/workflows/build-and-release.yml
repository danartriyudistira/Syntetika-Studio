name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.3.0)'
        required: true
        default: '1.3.0'

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare installer payload
        shell: powershell
        run: |
          $releaseDir = "build\Source\Syntetika_artefacts\Release"
          $payloadDir = "$env:RUNNER_TEMP\payload"
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
          Copy-Item "$releaseDir\Syntetika.exe" -Destination $payloadDir
          Copy-Item "$releaseDir\python3.dll" -Destination $payloadDir -ErrorAction SilentlyContinue
          Copy-Item "$releaseDir\python313.dll" -Destination $payloadDir -ErrorAction SilentlyContinue
          Copy-Item -Recurse "$releaseDir\resource" -Destination $payloadDir
          Compress-Archive -Path "$payloadDir\*" -DestinationPath "$env:RUNNER_TEMP\Syntetika-Studio.zip" -CompressionLevel Optimal -Force

      - name: Create installer
        shell: powershell
        run: |
          $workDir = "$env:RUNNER_TEMP\installer"
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null
          Copy-Item "$env:RUNNER_TEMP\Syntetika-Studio.zip" -Destination "$workDir\Syntetika-Studio.zip"

          @'
          $ErrorActionPreference = "Stop"
          $packageDir = Split-Path -Parent $MyInvocation.MyCommand.Path
          $zipPath = Join-Path $packageDir "Syntetika-Studio.zip"
          $installDir = Join-Path $env:LOCALAPPDATA "Programs\Syntetika Studio"
          $startMenuDir = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\Syntetika Studio"
          $desktopShortcut = Join-Path ([Environment]::GetFolderPath("Desktop")) "Syntetika Studio.lnk"
          $startShortcut = Join-Path $startMenuDir "Syntetika Studio.lnk"
          $exePath = Join-Path $installDir "Syntetika.exe"
          if (Test-Path $installDir) { Remove-Item -LiteralPath $installDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $installDir -Force
          New-Item -ItemType Directory -Force -Path $startMenuDir | Out-Null
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($startShortcut)
          $shortcut.TargetPath = $exePath
          $shortcut.WorkingDirectory = $installDir
          $shortcut.Description = "Syntetika Studio"
          $shortcut.Save()
          $shortcut = $shell.CreateShortcut($desktopShortcut)
          $shortcut.TargetPath = $exePath
          $shortcut.WorkingDirectory = $installDir
          $shortcut.Description = "Syntetika Studio"
          $shortcut.Save()
          Write-Host "Syntetika Studio installed to $installDir"
          '@ | Set-Content -Path "$workDir\install.ps1" -Encoding ASCII

          @'
          @echo off
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File "%~dp0install.ps1"
          if errorlevel 1 (
            echo.
            echo Installation failed.
            pause
            exit /b 1
          )
          exit /b 0
          '@ | Set-Content -Path "$workDir\install.cmd" -Encoding ASCII

          $sedContent = @"
[Version]
Class=IEXPRESS
SEDVersion=3
[Options]
PackagePurpose=InstallApp
ShowInstallProgramWindow=1
HideExtractAnimation=1
UseLongFileName=1
InsideCompressed=0
CAB_FixedSize=0
CAB_ResvCodeSigning=0
RebootMode=N
InstallPrompt=
DisplayLicense=
FinishMessage=Syntetika Studio installation has finished.
TargetName=$env:RUNNER_TEMP\Syntetika-Studio-Setup.exe
FriendlyName=Syntetika Studio Installer
AppLaunched=install.cmd
PostInstallCmd=<None>
AdminQuietInstCmd=install.cmd
UserQuietInstCmd=install.cmd
SourceFiles=SourceFiles
[Strings]
FILE0="Syntetika-Studio.zip"
FILE1="install.ps1"
FILE2="install.cmd"
[SourceFiles]
SourceFiles0=$workDir
[SourceFiles0]
%FILE0%=
%FILE1%=
%FILE2%=
"@
          Set-Content -Path "$workDir\installer.sed" -Value $sedContent -Encoding ASCII
          & "$env:WINDIR\System32\iexpress.exe" /N /Q "$workDir\installer.sed"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Syntetika-Studio-Setup
          path: ${{ runner.temp }}/Syntetika-Studio-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Syntetika-Studio-Setup.exe
          generate_release_notes: true
